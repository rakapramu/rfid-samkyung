<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFID Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
      .card-rfid {
        border-radius: 15px;
      }
      .scroll-table {
        max-height: 300px;
        overflow-y: auto;
      }
      .epc-text {
        font-family: monospace;
        font-weight: bold;
      }

      .control-btn {
        min-width: 160px;
        font-weight: bold;
        border-radius: 10px;
      }

      .btn-connect {
        background: #198754;
        color: white;
      }
      .btn-disconnect {
        background: #dc3545;
        color: white;
      }
      .btn-start {
        background: #0d6efd;
        color: white;
      }
      .btn-stop {
        background: #ffc107;
        color: black;
      }

      .blink {
        animation: blinkAnim 1s infinite;
      }
      @keyframes blinkAnim {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container py-4">
      <!-- 🔥 CONTROL BUTTON -->
      <div class="d-flex gap-2 mb-4 justify-content-center flex-wrap">
        <button class="btn control-btn btn-connect" onclick="connectAll()">
          🔌 CONNECT ALL
        </button>

        <button
          class="btn control-btn btn-disconnect"
          onclick="disconnectAll()"
        >
          ❌ DISCONNECT ALL
        </button>

        <button
          id="btnStart"
          class="btn control-btn btn-start"
          onclick="startAll()"
        >
          ▶ START SCAN
        </button>

        <button
          id="btnStop"
          class="btn control-btn btn-stop"
          onclick="stopAll()"
        >
          ⏹ STOP SCAN
        </button>
      </div>

      <!-- DEVICE TABLE -->
      <div class="card shadow-sm p-3 mb-4 card-rfid">
        <h5>Device Status</h5>

        <table class="table table-hover">
          <thead class="table-dark">
            <tr>
              <th>IP</th>
              <th>PORT</th>
              <th>Status</th>
              <th>Scan</th>
              <th>Total</th>
              <th>Unique</th>
            </tr>
          </thead>
          <tbody id="deviceTable"></tbody>
        </table>
      </div>

      <!-- INVENTORY PER DEVICE -->
      <div class="card shadow-sm p-3 card-rfid">
        <h5>Inventory (Per Device)</h5>

        <select id="deviceSelect" class="form-select mb-3"></select>

        <div class="scroll-table">
          <table class="table table-bordered">
            <thead class="table-secondary sticky-top">
              <tr>
                <th>No</th>
                <th>EPC</th>
                <th>Count</th>
              </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
          </table>
        </div>
      </div>

      <!-- GLOBAL INVENTORY -->
      <div class="card shadow-sm p-3 mt-4 card-rfid">
        <h5>Global Inventory</h5>

        <div class="scroll-table">
          <table class="table table-bordered">
            <thead class="table-dark sticky-top">
              <tr>
                <th>No</th>
                <th>EPC</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="globalInventoryBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8001";

      const DEVICE_LIST = [
        { ip: "134.244.2.190", port: 6000 },
        { ip: "134.244.2.116", port: 49152 },
        { ip: "134.244.2.117", port: 49152 },
      ];

      let selectedIP = DEVICE_LIST[0].ip;

      // =====================
      // ACTIONS
      // =====================
      async function connectAll() {
        await Promise.all(
          DEVICE_LIST.map((d) =>
            axios.post(API + "/connect", d).catch(() => {}),
          ),
        );
      }

      async function disconnectAll() {
        await Promise.all(
          DEVICE_LIST.map((d) =>
            axios.post(API + "/disconnect", { ip: d.ip }).catch(() => {}),
          ),
        );
      }

      async function startAll() {
        await Promise.all(
          DEVICE_LIST.map((d) =>
            axios.post(API + "/start-scan", { ip: d.ip }).catch(() => {}),
          ),
        );
      }

      async function stopAll() {
        await Promise.all(
          DEVICE_LIST.map((d) =>
            axios.post(API + "/stop-scan", { ip: d.ip }).catch(() => {}),
          ),
        );
      }

      // =====================
      // LOAD DEVICES
      // =====================
      async function loadDevices() {
        let res = await axios.get(API + "/devices");
        let active = res.data;

        let html = "";

        for (let dev of DEVICE_LIST) {
          let found = active.find((d) => d.ip === dev.ip);

          let connected = found ? found.connected : false;
          let scanning = found ? found.scanning : false;

          let total = 0;
          let unique = 0;

          if (connected) {
            try {
              let stat = await axios.get(API + "/stats/" + dev.ip);
              total = stat.data.total_read;
              unique = stat.data.unique_tags;
            } catch {}
          }

          html += `
        <tr>
            <td>${dev.ip}</td>
            <td>${dev.port}</td>
            <td>${connected ? "🟢 CONNECTED" : "🔴 OFFLINE"}</td>
            <td>${scanning ? '<span class="blink">SCANNING</span>' : "IDLE"}</td>
            <td><b>${total}</b></td>
            <td>${unique}</td>
        </tr>`;
        }

        document.getElementById("deviceTable").innerHTML = html;

        // dropdown
        let select = document.getElementById("deviceSelect");
        select.innerHTML = DEVICE_LIST.map(
          (d) =>
            `<option value="${d.ip}" ${d.ip === selectedIP ? "selected" : ""}>${d.ip}</option>`,
        ).join("");
      }

      // =====================
      // INVENTORY PER DEVICE
      // =====================
      async function loadInventory() {
        try {
          let res = await axios.get(API + "/inventory/" + selectedIP);
          let data = res.data;

          let html = data.length
            ? data
                .map(
                  (item, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td class="epc-text">${item.epc}</td>
                    <td>${item.count}</td>
                </tr>
            `,
                )
                .join("")
            : `<tr><td colspan="3" class="text-center">No Tag</td></tr>`;

          document.getElementById("inventoryBody").innerHTML = html;
        } catch {}
      }

      // =====================
      // GLOBAL INVENTORY
      // =====================
      async function loadGlobalInventory() {
        try {
          let res = await axios.get(API + "/inventory-all");
          let data = res.data;

          let html = data.length
            ? data
                .map(
                  (item, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td class="epc-text">${item.epc}</td>
                    <td><b>${item.count}</b></td>
                </tr>
            `,
                )
                .join("")
            : `<tr><td colspan="3" class="text-center">No Tag</td></tr>`;

          document.getElementById("globalInventoryBody").innerHTML = html;
        } catch {}
      }

      // =====================
      // EVENT SELECT
      // =====================
      document
        .getElementById("deviceSelect")
        .addEventListener("change", function () {
          selectedIP = this.value;
        });

      // =====================
      // AUTO REFRESH
      // =====================
      setInterval(() => {
        loadDevices();
        loadInventory();
        loadGlobalInventory();
      }, 1000);

      loadDevices();
    </script>
  </body>
</html>
